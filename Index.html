<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landing Page | BlueComet Work Network</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@900&display=swap" rel="stylesheet">
<style>
:root {
    --bg-color: #050505;
    --bluecomet-color: #00f2ff;
    --bluecomet-accent: #0077ff;
    --bytestar-color: #00d4ff;
    --bytestar-accent: #00aaff;
    --crow-primary: #a17fff;
    --crow-secondary: #5ac8fa;

    /* New AiiTONE.NET colors */
    --aiitone-color: #00f2ff; /* Cyber Cyan */
    --aiitone-accent: #7000ff; /* Electric Purple */
}

body {
    margin: 0;
    padding: 0;
    background-color: var(--bg-color);
    font-family: 'Orbitron', sans-serif;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
}

h1.welcome {
    margin: 20px 0;
    font-size: clamp(2rem, 5vw, 3rem);
    text-align: center;
}

/* Logo container */
.logo-container {
    position: relative;
    text-align: center;
    cursor: pointer;
    margin: 30px 0;
    width: 90%;
    max-width: 800px;
    max-height: 25vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* Glow ring */
.glow-ring {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    filter: blur(50px);
    opacity: 0.2;
    animation: pulse 3s ease-in-out infinite;
    z-index: -1;
}

/* Particle container */
.particles {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

/* Particle style */
.particle {
    position: absolute;
    width: 2px;
    height: 2px;
    border-radius: 50%;
    opacity: 0;
    animation: starTrail 2s linear infinite;
}

/* Logo text */
.text-logo {
    position: relative;
    user-select: none;
    line-height: 1;
    word-break: break-word;
    font-size: clamp(2rem, 6vw, 4rem);
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* Inline suffix for AiiTONE.NET */
.text-logo .suffix {
    font-size: 1.5rem;
    vertical-align: middle;
    opacity: 0.8;
    margin-left: 4px;
}

/* Subtitle */
.subtitle {
    margin-top: 6px;
    line-height: 1.2;
    font-size: clamp(1rem, 2.5vw, 1.5rem);
    text-align: center;
}

/* Animations */
@keyframes pulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.15; }
    50% { transform: translate(-50%, -50%) scale(1.4); opacity: 0.35; }
}
@keyframes shimmer { to { background-position: 300% center; } }
@keyframes starTrail {
    0% { transform: translate(var(--x-start), var(--y-start)) scale(0); opacity: 1; }
    100% { transform: translate(var(--x-end), var(--y-end)) scale(0.5); opacity: 0; }
}

/* Hover effects */
.logo-container:hover .glow-ring {
    opacity: 0.45;
    filter: blur(70px);
}
.logo-container:hover .text-logo span {
    animation-duration: 3s;
}

/* AiiTONE.NET Motion Logo Styles */
.aiitone-motion {
    margin-top: 50px;
    position: relative;
    text-align: center;
    cursor: pointer;
}

.aiitone-motion .glow-ring {
    width: 120%;
    height: 120%;
    background: radial-gradient(circle, var(--aiitone-color) 0%, transparent 70%);
    opacity: 0.15;
    filter: blur(40px);
    animation: breathe 4s ease-in-out infinite;
}

.aiitone-motion .text-logo {
    font-family: 'Inter', sans-serif;
    font-size: 5rem;
    letter-spacing: -2px;
    color: #fff;
}

.aiitone-motion .text-logo span {
    background: linear-gradient(90deg, #fff, var(--aiitone-color), var(--aiitone-accent), #fff);
    background-size: 300% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 6s linear infinite;
}

@keyframes breathe {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.1; }
    50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.3; }
}

</style>
</head>
<body>

<h1 class="welcome">Welcome to</h1>

<!-- BlueCometWork -->
<a href="https://bluecomet.work" target="_blank">
<div class="logo-container" id="bluecomet">
    <div class="glow-ring" style="width:100%; height:100%; background: radial-gradient(circle, var(--bluecomet-color) 0%, transparent 70%);"></div>
    <h1 class="text-logo" style="font-family:'Inter', sans-serif;">
        <span style="background: linear-gradient(90deg, #fff, var(--bluecomet-color), var(--bluecomet-accent), #fff); background-size:300% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 6s linear infinite;">🚀 BlueCometWork</span>
        <div class="subtitle">ABOUT</div>
    </h1>
    <div class="particles"></div>
</div>
</a>

<!-- ByteStar -->
<a href="https://bytestar.bluecomet.work" target="_blank">
<div class="logo-container" id="bytestar">
    <div class="glow-ring" style="width:100%; height:100%; background: radial-gradient(circle, var(--bytestar-color) 0%, transparent 70%);"></div>
    <h1 class="text-logo" style="font-family:'Orbitron', sans-serif;">
        <span style="background: linear-gradient(90deg, #fff, var(--bytestar-color), var(--bytestar-accent), #fff); background-size:300% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 6s linear infinite;">✨ ByteStar</span>
        <div class="subtitle">For CSS / JS / HTML</div>
    </h1>
    <div class="particles"></div>
</div>
</a>

<!-- CROW -->
<a href="https://crow.bluecomet.work" target="_blank">
<div class="logo-container" id="crow">
    <div class="glow-ring" style="width:100%; height:100%; background: radial-gradient(circle, var(--crow-primary) 0%, transparent 70%);"></div>
    <h1 class="text-logo" style="font-family:'Orbitron', sans-serif;">
        <span style="background: linear-gradient(90deg, var(--crow-primary), var(--crow-secondary), var(--crow-primary)); background-size:300% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 6s linear infinite;">CROW</span>
        <div class="subtitle">THE World Words Hub<br>- a linguistic kaleidoscope</div>
    </h1>
    <div class="particles"></div>
</div>
</a>

<!-- AiiTONE.NET Motion Logo -->
<a href="https://aiitone.net" target="_blank">
<div class="aiitone-motion">
    <div class="glow-ring"></div>
    <h1 class="text-logo">
        <span>AiiTONE</span><span class="suffix">.NET</span>
    </h1>
</div>
</a>

<script>
// Particle creation for other logos
function initParticles(containerId) {
    const particleContainer = document.querySelector(`#${containerId} .particles`);
    const numParticles = 25;
    for(let i=0;i<numParticles;i++){
        const p = document.createElement('div');
        p.classList.add('particle');
        const startX = Math.random()*100 + '%';
        const startY = Math.random()*100 + '%';
        const endX = (parseInt(startX)+(Math.random()*50-25))+'%';
        const endY = (parseInt(startY)+(Math.random()*50-25))+'%';
        p.style.setProperty('--x-start', startX);
        p.style.setProperty('--y-start', startY);
        p.style.setProperty('--x-end', endX);
        p.style.setProperty('--y-end', endY);
        p.style.animationDelay = Math.random()*2+'s';
        p.style.animationDuration = (1+Math.random()*1.5)+'s';
        particleContainer.appendChild(p);
    }
}

['bluecomet','bytestar','crow'].forEach(id => initParticles(id));
</script>

</body>
</html>
