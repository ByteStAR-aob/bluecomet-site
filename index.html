<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueComet Work Network</title>
    <meta name="description" content="Portals to BlueCometWork, ByteStar, CROW, SLANG, AZ2ii, and AiiTONE.">
    <link rel="icon" href="data:,">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #050505;
            --bluecomet-color: #00f2ff;
            --bytestar-color: #00d4ff;
            --crow-primary: #a17fff;
            --slang-primary: #ff5fd2;
            --az2ii-primary: #a020f0;
            --aiitone-color: #00f2ff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Orbitron', system-ui, sans-serif;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .welcome {
            margin: 40px 20px 30px;
            font-size: clamp(2rem, 5vw, 3.2rem);
            text-align: center;
            letter-spacing: 2px;
        }

        .section {
            width: 90%;
            max-width: 820px;
            margin: 22px 0;
            text-align: center;
            position: relative;
        }

        .logo-container {
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .logo-container:hover {
            transform: translateY(-4px);
        }

        .accent-bar {
            height: 14px;
            border-radius: 8px;
            margin: 14px auto 10px;
            max-width: 280px;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .text-logo {
            font-size: clamp(2rem, 6.5vw, 4rem);
            line-height: 1.1;
            margin: 0;
        }

        .subtitle {
            font-size: clamp(1rem, 2.8vw, 1.4rem);
            opacity: 0.9;
            margin-top: 6px;
            line-height: 1.3;
        }

        /* Gradient bars - matching your preview style */
        #bluecomet .accent-bar {
            background: linear-gradient(90deg, #00f2ff, #0099ff);
        }
        #bytestar .accent-bar {
            background: linear-gradient(90deg, #00d4ff, #0088ff);
        }
        #crow .accent-bar {
            background: linear-gradient(90deg, #a17fff, #5ac8fa);
        }
        #slang .accent-bar {
            background: linear-gradient(90deg, #ff5fd2, #49f2ff);
        }
        #az2ii .accent-bar {
            background: linear-gradient(90deg, #a020f0, #d18bff);
        }

        /* AiiTONE special */
        .aiitone-motion {
            margin: 50px 20px 40px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .aiitone-motion:hover {
            transform: translateY(-6px);
        }
        .aiitone-motion .text-logo {
            font-family: 'Inter', sans-serif;
            font-size: clamp(3rem, 8.5vw, 5.2rem);
            letter-spacing: -2px;
        }
        .aiitone-motion .accent-bar {
            background: linear-gradient(90deg, #7000ff, #00f2ff);
            height: 12px;
            max-width: 240px;
        }
    </style>
</head>
<body>

    <h1 class="welcome">Welcome to</h1>

    <!-- BlueCometWork -->
    <a href="https://about.bluecomet.work" target="_blank" rel="noopener noreferrer" class="section" id="bluecomet">
        <div class="logo-container">
            <h1 class="text-logo" style="color: #00f2ff;">🚀 BlueCometWork</h1>
            <div class="subtitle">ABOUT</div>
        </div>
        <div class="accent-bar"></div>
    </a>

    <!-- ByteStar -->
    <a href="https://bytestar.bluecomet.work" target="_blank" rel="noopener noreferrer" class="section" id="bytestar">
        <div class="logo-container">
            <h1 class="text-logo" style="color: #00d4ff;">✨ ByteStar</h1>
            <div class="subtitle">For CSS / JS / HTML</div>
        </div>
        <div class="accent-bar"></div>
    </a>

    <!-- CROW -->
    <a href="https://crow.bluecomet.work" target="_blank" rel="noopener noreferrer" class="section" id="crow">
        <div class="logo-container">
            <h1 class="text-logo" style="background: linear-gradient(90deg, #a17fff, #5ac8fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">CROW</h1>
            <div class="subtitle">THE World Words Hub<br>— a linguistic kaleidoscope</div>
        </div>
        <div class="accent-bar"></div>
    </a>

    <!-- SLANG -->
    <a href="https://slang.bluecomet.work" target="_blank" rel="noopener noreferrer" class="section" id="slang">
        <div class="logo-container">
            <h1 class="text-logo" style="background: linear-gradient(90deg, #ff5fd2, #7c7cff, #49f2ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">SLANG</h1>
            <div class="subtitle">Stickers • Logos • Alphabet • Numbers • Glyphs</div>
        </div>
        <div class="accent-bar"></div>
    </a>

    <!-- AZ2ii -->
    <a href="https://az2ii.aiitone.net" target="_blank" rel="noopener noreferrer" class="section" id="az2ii">
        <div class="logo-container">
            <h1 class="text-logo" style="background: linear-gradient(90deg, #a020f0, #d18bff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">AZ2ii ☔</h1>
            <div class="subtitle">Purple Rain Protocol</div>
        </div>
        <div class="accent-bar"></div>
    </a>

    <!-- AiiTONE -->
    <a href="https://aiitone.net" target="_blank" rel="noopener noreferrer" class="section">
        <div class="aiitone-motion">
            <h1 class="text-logo" style="background: linear-gradient(90deg, #fff, #00f2ff, #7000ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                AiiTONE<span style="font-size:0.55em; vertical-align: super; margin-left: 4px;">.NET</span>
            </h1>
            <div class="accent-bar"></div>
        </div>
    </a>

</body>
</html>
